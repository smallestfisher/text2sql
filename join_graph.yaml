version: 0.1
description: >
  Initial join graph for Text2SQL planning and compilation.
  Relations are expressed between semantic entities. The compiler should only
  use joins declared here or in approved templates.

policies:
  allow_undefined_join: false
  allow_fact_to_fact_join: false
  default_join_type: left

relations:
  - id: inventory_daily_to_product_attributes
    left_entity: Inventory.Daily
    left_field: product_id
    right_entity: Product.Attributes
    right_field: product_id
    relation_type: direct_dimension
    cardinality: many_to_one
    join_type: left
    condition_template: "i.product_ID = pa.product_ID"

  - id: inventory_oms_to_product_attributes
    left_entity: Inventory.OMS
    left_field: product_id
    right_entity: Product.Attributes
    right_field: product_id
    relation_type: direct_dimension
    cardinality: many_to_one
    join_type: left
    condition_template: "i.product_ID = pa.product_ID"

  - id: plan_daily_to_product_attributes
    left_entity: Plan.Daily
    left_field: product_id
    right_entity: Product.Attributes
    right_field: product_id
    relation_type: direct_dimension
    cardinality: many_to_one
    join_type: left
    condition_template: "p.product_ID = pa.product_ID"

  - id: plan_weekly_to_product_attributes
    left_entity: Plan.Weekly
    left_field: product_id
    right_entity: Product.Attributes
    right_field: product_id
    relation_type: direct_dimension
    cardinality: many_to_one
    join_type: left
    condition_template: "p.product_ID = pa.product_ID"

  - id: plan_monthly_to_product_attributes
    left_entity: Plan.MonthlyApproved
    left_field: product_id
    right_entity: Product.Attributes
    right_field: product_id
    relation_type: direct_dimension
    cardinality: many_to_one
    join_type: left
    condition_template: "p.product_ID = pa.product_ID"

  - id: production_actual_to_product_attributes
    left_entity: Production.Actual
    left_field: product_id
    right_entity: Product.Attributes
    right_field: product_id
    relation_type: direct_dimension
    cardinality: many_to_one
    join_type: left
    condition_template: "a.product_ID = pa.product_ID"

templates:
  - id: inventory_daily_with_product_attributes
    description: Inventory.Daily can directly join Product.Attributes using product_ID.
    entities: ["Inventory.Daily", "Product.Attributes"]
    steps:
      - join: inventory_daily_to_product_attributes

  - id: inventory_oms_with_product_attributes
    description: Inventory.OMS can directly join Product.Attributes using product_ID.
    entities: ["Inventory.OMS", "Product.Attributes"]
    steps:
      - join: inventory_oms_to_product_attributes

  - id: plan_daily_with_product_attributes
    description: Plan.Daily can directly join Product.Attributes using product_ID.
    entities: ["Plan.Daily", "Product.Attributes"]
    steps:
      - join: plan_daily_to_product_attributes

  - id: plan_weekly_with_product_attributes
    description: Plan.Weekly can directly join Product.Attributes using product_ID.
    entities: ["Plan.Weekly", "Product.Attributes"]
    steps:
      - join: plan_weekly_to_product_attributes

  - id: plan_monthly_with_product_attributes
    description: Plan.MonthlyApproved can directly join Product.Attributes using product_ID.
    entities: ["Plan.MonthlyApproved", "Product.Attributes"]
    steps:
      - join: plan_monthly_to_product_attributes

  - id: production_with_product_attributes
    description: Production actuals can directly join Product.Attributes using product_ID.
    entities: ["Production.Actual", "Product.Attributes"]
    steps:
      - join: production_actual_to_product_attributes

cross_fact_rules:
  - id: no_direct_fact_join
    rule: direct joins between fact entities are disallowed by default
    examples:
      - Demand.V <-> Inventory.Daily
      - Sales.Financial <-> Production.Actual
    allowed_via:
      - approved aggregate templates
      - future curated analytical marts
