version: 0.1
description: >
  Initial semantic model for the Text2SQL system based on tables.json.
  This model defines business entities, metrics, dimensions, defaults,
  required slots, and source mappings. It is intended to constrain the
  planner and compiler rather than be exposed directly to end users.

global_policies:
  query_mode: read_only
  allow_multi_fact_join: false
  default_limit: 100
  max_limit: 1000
  followup_context_window_turns: 5

common_dimensions:
  date:
    type: date
    synonyms: ["日期", "天", "每日", "生产日期", "排产日期", "上报日期"]
  month:
    type: month
    synonyms: ["月份", "月", "本月", "结算月", "计划月份", "需求月份"]
  version:
    type: string
    synonyms: ["版本", "版次", "PM版本", "版本号"]
  factory:
    type: string
    synonyms: ["工厂", "厂别", "工厂代码"]
    note: >
      各表物理字段名不同：daily_inventory/daily_PLAN/monthly_plan_approved 用 factory_code，
      weekly_rolling_plan 用 factory，production_actuals 用 FACTORY。
      编译器应根据实体 dimensions 中的 physical_field 决定实际 SQL 字段。
  customer:
    type: string
    synonyms: ["客户"]
  sbu:
    type: string
    synonyms: ["SBU", "事业部"]
  bu:
    type: string
    synonyms: ["BU"]
  fg_code:
    type: string
    synonyms: ["FGCODE", "成品型号", "产品编码", "成品编码"]
  product_id:
    type: string
    synonyms: ["product_ID", "产品型号", "产品", "料号"]
  application:
    type: string
    synonyms: ["应用", "应用领域", "场景"]
  grade:
    type: string
    synonyms: ["等级", "品级"]

entities:
  Demand.V:
    # 业务域。用于意图识别和候选实体筛选，表示这是“需求”类问题。
    domain: demand
    # 实体说明。告诉系统这个节点代表 Vendor/Customer Demand，即 V 版生产需求。
    description: Vendor/Customer Demand，V版生产需求。
    source:
      # 数据来源类型。semantic_view 表示先做语义加工，再作为查询对象使用。
      type: semantic_view
      # 语义视图名称。是系统内部对这层展开结果的逻辑命名。
      name: semantic_demand_v
      # 底层物理来源表。说明该实体最终来自 v_demand。
      base_tables: ["v_demand"]
      unpivot:
        # 展开规则说明。解释为什么要把横向宽表转成长表。
        description: >
          v_demand 是横向宽表，MONTH 列为起始月份，后续列为相对偏移月份。
          语义视图需将宽表展开为长表，每行一个月份一个需求量。
        # 起始月份列。后续所有需求月份都以 MONTH 为基准做偏移。
        base_month_column: MONTH
        column_to_offset:
          # 起始月份的需求数量，对应偏移 0 个月。
          REQUIREMENT_QTY: 0
          # 第 2 个月需求数量，对应偏移 1 个月。
          NEXT_REQUIREMENT: 1
          # 第 3 个月需求数量，对应偏移 2 个月。
          LAST_REQUIREMENT: 2
          # 第 4 个月需求数量，对应偏移 3 个月。
          MONTH4: 3
          # 第 5 个月需求数量，对应偏移 4 个月。
          MONTH5: 4
          # 第 6 个月需求数量，对应偏移 5 个月。
          MONTH6: 5
          # 第 7 个月需求数量，对应偏移 6 个月。
          MONTH7: 6
        output_columns:
          # 展开后的需求月份字段。由 MONTH 加偏移量计算得到。
          demand_month: "DATE_ADD(MONTH, INTERVAL offset MONTH)"
          # 展开后的需求量字段。值来自对应偏移列。
          demand_qty: "对应偏移列的值"
        # 示例 SQL。说明宽表展开成长表的大致实现方式，供编译器/维护者参考。
        example_sql: >
          SELECT pm_version, fg_code, sbu, customer,
                 DATE_ADD(MONTH, INTERVAL 0 MONTH) AS demand_month,
                 REQUIREMENT_QTY AS demand_qty
          FROM v_demand
          UNION ALL
          SELECT pm_version, fg_code, sbu, customer,
                 DATE_ADD(MONTH, INTERVAL 1 MONTH) AS demand_month,
                 NEXT_REQUIREMENT AS demand_qty
          FROM v_demand
          -- ... repeat for each offset column
    # 业务粒度。表示一条语义记录大致唯一对应 型号+客户+月份+版本。
    grain: fg_code_customer_month_version
    # 主时间字段。用户说“上月/未来三个月”时默认过滤这个字段。
    time_field: demand_month
    # 版本字段。用户提到“最新版本/某个版本”时默认映射到这里。
    version_field: pm_version
    # 识别字段集合。用于表达记录标识、去重和上下文继承。
    id_fields: ["pm_version", "fg_code", "sbu", "customer", "demand_month"]
    metrics:
      demand_qty:
        # 指标表达式。引用展开后的 demand_qty 字段。
        expr: demand_qty
        # 默认聚合方式。查询“需求是多少”时默认做 SUM。
        agg: sum
        # 指标类型。说明该字段可做数值聚合。
        type: number
        # 指标同义词。把用户自然语言里的“需求/预测需求”等映射到这个指标。
        synonyms: ["需求", "需求量", "V版需求", "预测需求"]
    dimensions:
      fg_code:
        # 成品型号维度。用于按型号过滤或分组。
        field: fg_code
      sbu:
        # SBU 维度。用于按事业部过滤或分组。
        field: sbu
      customer:
        # 客户维度。用于按客户过滤或分组。
        field: customer
      demand_month:
        # 需求月份维度。既可作为时间过滤字段，也可用于按月分组。
        field: demand_month
      pm_version:
        # 版本维度。用于按 PM 版本过滤或分组。
        field: pm_version
    required_slots:
      # 必填槽位。查询该实体时必须限定时间范围，避免无边界全表查询。
      - time_range
    optional_slots:
      # 可选过滤槽位。用户提供时可加入查询条件，不提供也能查。
      - version
      - customer
      - sbu
      - fg_code
    defaults:
      # 默认版本。用户未指定版本时，默认取最新版本。
      version: latest
      # 默认时间粒度。该实体默认按月查询。
      time_grain: month
    unsupported:
      # 不支持的查询类型。禁止直接整表明细导出。
      - direct_detail_row_dump
    followup_inheritance:
      keep:
        # 追问时保留的上下文条件。
        - time_range
        - customer
        - sbu
      drop_on_entity_change:
        # 切换到其他实体时应丢弃的上下文条件，避免错误继承。
        - pm_version

  Demand.P:
    domain: demand
    description: Production Demand，P版生产需求。
    source:
      type: semantic_view
      name: semantic_demand_p
      base_tables: ["p_demand"]
      unpivot:
        description: >
          p_demand 与 v_demand 结构相同，同为横向宽表。
          语义视图需将宽表展开为长表，每行一个月份一个需求量。
        base_month_column: MONTH
        column_to_offset:
          REQUIREMENT_QTY: 0
          NEXT_REQUIREMENT: 1
          LAST_REQUIREMENT: 2
          MONTH4: 3
          MONTH5: 4
          MONTH6: 5
          MONTH7: 6
        output_columns:
          demand_month: "DATE_ADD(MONTH, INTERVAL offset MONTH)"
          demand_qty: "对应偏移列的值"
    grain: fg_code_customer_month_version
    time_field: demand_month
    version_field: pm_version
    id_fields: ["pm_version", "fg_code", "sbu", "bu", "customer", "demand_month"]
    metrics:
      demand_qty:
        expr: demand_qty
        agg: sum
        type: number
        synonyms: ["P版需求", "工厂需求", "生产需求"]
    dimensions:
      fg_code:
        field: fg_code
      sbu:
        field: sbu
      bu:
        field: bu
      customer:
        field: customer
      demand_month:
        field: demand_month
      pm_version:
        field: pm_version
    required_slots:
      - time_range
    optional_slots:
      - version
      - customer
      - sbu
      - bu
      - fg_code
    defaults:
      version: latest
      time_grain: month

  Inventory.Daily:
    domain: inventory
    description: 每日库存快照。
    source:
      type: table
      name: daily_inventory
      base_tables: ["daily_inventory"]
    grain: date_factory_location_product_grade
    time_field: report_date
    id_fields: ["report_date", "factory_code", "ERP_FACTORY", "ERP_LOCATION", "product_ID", "GRADE", "CHECKINCODE"]
    metrics:
      ttl_qty:
        expr: TTL_Qty
        agg: sum
        type: number
        synonyms: ["总库存", "TTL库存", "库存量"]
      hold_qty:
        expr: HOLD_Qty
        agg: sum
        type: number
        synonyms: ["Hold库存", "冻结库存"]
      available_qty:
        expr: "TTL_Qty - HOLD_Qty"
        agg: sum
        type: number
        synonyms: ["可用库存", "可用量"]
    dimensions:
      report_date:
        field: report_date
      factory:
        field: factory_code
        semantic_name: factory
        physical_field: factory_code
      erp_factory:
        field: ERP_FACTORY
      erp_location:
        field: ERP_LOCATION
      product_id:
        field: product_ID
      production_type:
        field: PRODUCTION_TYPE
      grade:
        field: GRADE
      application:
        field: application
        via_entity: Product.Attributes
    required_slots: []
    optional_slots:
      - date
      - factory
      - product_id
      - application
      - grade
    defaults:
      date: latest
      time_grain: day

  Inventory.OMS:
    domain: inventory
    description: OMS月度库存与库龄库存。
    source:
      type: table
      name: oms_inventory
      base_tables: ["oms_inventory"]
    grain: month_product_customer_location_grade
    time_field: report_month
    id_fields: ["report_month", "product_ID", "SBU_DESC", "BU_DESC", "CUSTOMER", "ERP_FACTORY", "ERP_LOCATION", "LGORT_DL", "LGORT_LX", "GRADE_FL", "GRADE"]
    metrics:
      glass_qty:
        expr: glass_qty
        agg: sum
        type: number
        synonyms: ["glass库存", "玻璃库存"]
      panel_qty:
        expr: panel_qty
        agg: sum
        type: number
        synonyms: ["panel库存", "面板库存"]
      one_age_panel_qty:
        expr: ONE_AGE_panel_qty
        agg: sum
        type: number
        synonyms: ["0-1月库龄", "1个月内库龄"]
      two_age_panel_qty:
        expr: TWO_AGE_panel_qty
        agg: sum
        type: number
        synonyms: ["1-2月库龄"]
      three_age_panel_qty:
        expr: THREE_AGE_panel_qty
        agg: sum
        type: number
        synonyms: ["2-3月库龄"]
      four_age_panel_qty:
        expr: FOUR_AGE_panel_qty
        agg: sum
        type: number
        synonyms: ["3-6月库龄"]
      five_age_panel_qty:
        expr: FIVE_AGE_panel_qty
        agg: sum
        type: number
        synonyms: ["6-12月库龄", "半年以上库龄"]
      six_age_panel_qty:
        expr: SIX_AGE_panel_qty
        agg: sum
        type: number
        synonyms: ["12-24月库龄", "1-2年库龄"]
      seven_age_panel_qty:
        expr: SEVEN_AGE_panel_qty
        agg: sum
        type: number
        synonyms: ["24-36月库龄", "2-3年库龄"]
      eight_age_panel_qty:
        expr: EUGHT_AGE_panel_qty
        agg: sum
        type: number
        synonyms: ["36月以上库龄", "3年以上库龄"]
    dimensions:
      report_month:
        field: report_month
      product_id:
        field: product_ID
      sbu:
        field: SBU_DESC
      bu:
        field: BU_DESC
      customer:
        field: CUSTOMER
      erp_factory:
        field: ERP_FACTORY
      erp_location:
        field: ERP_LOCATION
      grade:
        field: GRADE
      application:
        field: application
        via_entity: Product.Attributes
    required_slots: []
    optional_slots:
      - month
      - customer
      - product_id
      - application
    defaults:
      month: latest
      time_grain: month

  Plan.Daily:
    domain: plan
    description: 每日排产计划。
    source:
      type: table
      name: daily_PLAN
      base_tables: ["daily_PLAN"]
    grain: date_factory_product
    time_field: PLAN_date
    id_fields: ["PLAN_date", "factory_code", "product_ID"]
    metrics:
      target_qty:
        expr: target_qty
        agg: sum
        type: number
        synonyms: ["日计划", "计划产出", "计划量", "日排产"]
    dimensions:
      plan_date:
        field: PLAN_date
      factory:
        field: factory_code
        semantic_name: factory
        physical_field: factory_code
      product_id:
        field: product_ID
      application:
        field: application
        via_entity: Product.Attributes
    required_slots: []
    optional_slots:
      - date
      - factory
      - product_id
      - application
    defaults:
      date: latest
      time_grain: day

  Plan.Weekly:
    domain: plan
    description: 周滚动计划。
    source:
      type: table
      name: weekly_rolling_plan
      base_tables: ["weekly_rolling_plan"]
    grain: date_factory_product_version
    time_field: plan_date
    version_field: PM_VERSION
    id_fields: ["PM_VERSION", "plan_date", "factory", "product_ID"]
    metrics:
      plan_qty:
        expr: plan_qty
        agg: sum
        type: number
        synonyms: ["周计划", "周滚动计划", "滚动计划"]
    dimensions:
      plan_date:
        field: plan_date
      factory:
        field: factory
        semantic_name: factory
        physical_field: factory
      product_id:
        field: product_ID
      pm_version:
        field: PM_VERSION
      application:
        field: application
        via_entity: Product.Attributes
    required_slots: []
    optional_slots:
      - date
      - version
      - factory
      - product_id
    defaults:
      version: latest
      time_grain: day

  Plan.MonthlyApproved:
    domain: plan
    description: 已审批月度投入产出计划。
    source:
      type: table
      name: monthly_plan_approved
      base_tables: ["monthly_plan_approved"]
    grain: month_date_factory_product
    time_field: plan_month
    id_fields: ["plan_month", "PLAN_date", "factory_code", "product_ID"]
    metrics:
      target_in_glass_qty:
        expr: target_IN_glass_qty
        agg: sum
        type: number
        synonyms: ["目标投入glass", "投入glass量"]
      target_in_panel_qty:
        expr: target_in_panel_qty
        agg: sum
        type: number
        synonyms: ["目标投入panel", "投入panel量"]
      target_out_glass_qty:
        expr: target_Out_glass_qty
        agg: sum
        type: number
        synonyms: ["目标产出glass", "产出glass量"]
      target_out_panel_qty:
        expr: target_Out_panel_qty
        agg: sum
        type: number
        synonyms: ["目标产出panel", "产出panel量"]
    dimensions:
      plan_month:
        field: plan_month
      plan_date:
        field: PLAN_date
      factory:
        field: factory_code
        semantic_name: factory
        physical_field: factory_code
      product_id:
        field: product_ID
      application:
        field: application
        via_entity: Product.Attributes
    required_slots: []
    optional_slots:
      - month
      - factory
      - product_id
      - application
    defaults:
      month: latest
      time_grain: month

  Production.Actual:
    domain: production
    description: 生产实绩，含投入、产出、报废。
    source:
      type: table
      name: production_actuals
      base_tables: ["production_actuals"]
    grain: date_factory_product_act_type
    time_field: work_date
    id_fields: ["work_date", "FACTORY", "product_ID", "act_type"]
    metrics:
      gls_qty:
        expr: GLS_qty
        agg: sum
        type: number
        synonyms: ["glass产量", "glass量"]
      panel_qty:
        expr: Panel_qty
        agg: sum
        type: number
        synonyms: ["panel产量", "panel量", "产出量"]
      defect_qty:
        expr: defect_qty
        agg: sum
        type: number
        synonyms: ["报废", "不良", "不良数"]
    dimensions:
      work_date:
        field: work_date
      factory:
        field: FACTORY
        semantic_name: factory
        physical_field: FACTORY
      product_id:
        field: product_ID
      act_type:
        field: act_type
      application:
        field: application
        via_entity: Product.Attributes
    required_slots: []
    optional_slots:
      - date
      - factory
      - product_id
      - act_type
    defaults:
      date: latest
      time_grain: day

  Sales.Financial:
    domain: sales
    description: 销售与财务实绩。
    source:
      type: table
      name: sales_financial_perf
      base_tables: ["sales_financial_perf"]
    grain: month_customer_fgcode
    time_field: report_month
    id_fields: ["report_month", "SBU_DESC", "BU_DESC", "CUSTOMER", "FGCODE"]
    metrics:
      sales_qty:
        expr: sales_qty
        agg: sum
        type: number
        synonyms: ["销售实绩", "销售量"]
      financial_qty:
        expr: FINANCIAL_qty
        agg: sum
        type: number
        synonyms: ["财务实绩", "财务量"]
    dimensions:
      report_month:
        field: report_month
      sbu:
        field: SBU_DESC
      bu:
        field: BU_DESC
      customer:
        field: CUSTOMER
      fg_code:
        field: FGCODE
    required_slots: []
    optional_slots:
      - month
      - customer
      - fg_code
    defaults:
      month: latest
      time_grain: month

  Product.Attributes:
    domain: product
    description: 产品属性维表。
    source:
      type: table
      name: product_attributes
      base_tables: ["product_attributes"]
    grain: product
    id_fields: ["product_ID"]
    metrics: {}
    dimensions:
      product_id:
        field: product_ID
      application:
        field: application
      cut_num:
        field: CUT_NUM
      common_categories:
        field: common_categories
      is_oxide:
        field: IS_OXIDE
      is_xps:
        field: IS_XPS
      is_sloc:
        field: IS_sloc
      is_coater:
        field: IS_cOATER
      is_oa:
        field: IS_OA
      is_notch:
        field: IS_Notch
    required_slots: []
    optional_slots:
      - product_id
      - application

entity_families:
  Demand:
    members: ["Demand.V", "Demand.P"]
    clarification_slot: demand_type
  Inventory:
    members: ["Inventory.Daily", "Inventory.OMS"]
    clarification_slot: inventory_type
  Plan:
    members: ["Plan.Daily", "Plan.Weekly", "Plan.MonthlyApproved"]
    clarification_slot: plan_type
