name: Offline Regression

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  offline-regression:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Validate JSON assets
        run: |
          python -m json.tool semantic/semantic_layer.json > /dev/null
          python -m json.tool eval/evaluation_cases.json > /dev/null
          python -m json.tool examples/nl2sql_examples.template.json > /dev/null

      - name: Run semantic lint
        run: python backend/semantic_lint.py

      - name: Compile backend sources
        run: python -m compileall backend

      - name: Run offline regression
        run: python backend/offline_regression.py --failures-only --report-dir .artifacts/offline-regression

      - name: Upload offline regression artifact
        uses: actions/upload-artifact@v4
        with:
          name: offline-regression-report
          path: .artifacts/offline-regression
